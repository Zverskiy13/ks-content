<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Контент-платформа · Клиники Столицы</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Экран входа -->
  <div id="login" class="login">
    <div class="login-card">
      <div class="brand">Клиники&nbsp;Столицы</div>
      <div class="brand-sub">Контент-платформа регионов</div>
      <input id="li-email" type="email" placeholder="E-mail" autocomplete="username">
      <input id="li-pass" type="password" placeholder="Пароль" autocomplete="current-password">
      <button class="btn primary" onclick="doLogin()">Войти</button>
      <div id="li-err" class="err"></div>
    </div>
  </div>

  <!-- Основной интерфейс -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="logo">Клиники Столицы · <span>Контент</span></div>
      <div class="top-right">
        <select id="regionSel" onchange="onRegionChange()"></select>
        <span id="whoami" class="whoami"></span>
        <button class="btn ghost sm" onclick="doLogout()">Выйти</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab on" data-tab="viral" onclick="switchTab('viral')">🔥 Вирусное</button>
      <button class="tab" data-tab="plan" onclick="switchTab('plan')">🗓 Контент-план</button>
      <button class="tab hidden" id="tab-team" data-tab="team" onclick="switchTab('team')">👥 Команда</button>
    </nav>

    <main class="content">
      <section id="pane-viral" class="pane"></section>
      <section id="pane-plan" class="pane hidden"></section>
      <section id="pane-team" class="pane hidden"></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
